name: Deploy to Ubuntu

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: git -C ~/agentic-os pull

      - name: Install deps
        run: cd ~/agentic-os && npm install --prefer-offline

      - name: Build
        run: cd ~/agentic-os && npm run build

      - name: Restart service
        run: systemctl --user restart agentic-os && systemctl --user is-active agentic-os
